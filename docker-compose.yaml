version: "3.9"

services:
  app:
    build: .
    container_name: nextjs_app
    ports:
      - "3000:3000"

    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/media_db
    restart: always

  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: media_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

